# Docker Compose OTel Collector — backend router
# Runs in Docker Compose, using service names for inter-container communication.
# Receives OTLP telemetry on :4318 (HTTP) / :4317 (gRPC) and routes it
# to the Victoria* backends (VictoriaMetrics, VictoriaLogs, VictoriaTraces).
#
# This config uses service names (e.g., victoriametrics:8428) instead of localhost
# because Docker Compose creates a bridge network where services communicate via
# service names, not shared namespaces.
receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
        cors:
          allowed_origins: ["http://localhost:*", "http://127.0.0.1:*"]
      grpc:
        endpoint: "0.0.0.0:4317"
  hostmetrics:
    collection_interval: 15s
    scrapers:
      cpu:
      memory:
      disk:
      network:

exporters:
  otlphttp/victoriametrics:
    metrics_endpoint: "http://victoriametrics:8428/opentelemetry/v1/metrics"
    tls:
      insecure: true
  otlphttp/victorialogs:
    logs_endpoint: "http://victorialogs:9428/insert/opentelemetry/v1/logs"
    tls:
      insecure: true
  otlphttp/victoriatraces:
    traces_endpoint: "http://victoriatraces:10428/insert/opentelemetry/v1/traces"
    tls:
      insecure: true

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  batch:
    timeout: 5s
    send_batch_size: 1024

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/victoriatraces]
    metrics:
      receivers: [otlp, hostmetrics]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/victoriametrics]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/victorialogs]
