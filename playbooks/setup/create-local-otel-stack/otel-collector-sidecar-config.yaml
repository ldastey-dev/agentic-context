# Container OTel Collector — lightweight forwarder
# Runs inside agent containers as a sidecar, forwarding OTLP telemetry
# from in-container processes to the host local-otel-stack collector via
# host.containers.internal:4318.
#
# See also: otel-collector-config.yaml (the host-side collector
# that receives forwarded telemetry and routes it to Victoria* backends).
receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
      grpc:
        endpoint: "0.0.0.0:4317"

exporters:
  otlphttp:
    endpoint: "http://host.containers.internal:4318"
    tls:
      insecure: true

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  batch:
    timeout: 5s
    send_batch_size: 1024

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp]
